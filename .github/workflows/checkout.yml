name: Checkout
on:
  push:
    branches: ["master", "develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Deps
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint
  test:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Deeps
        run: npm ci --legacy-peer-deps
      - name: Test
        run: npm run test
